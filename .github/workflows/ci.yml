# All actions are pinned to a commit SHA per engineering-standards/standards/ci-cd.md
# section 2; the trailing comment is the human-readable version. Keep pins current
# via Dependabot's github-actions ecosystem updates (.github/dependabot.yml).

name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint, format, test, build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Install package and dev deps
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check --output-format=github .
      - name: Format check
        run: ruff format --check .
      - name: Test
        run: pytest tests/ -v --cov=src --cov-report=term-missing
      - name: Build wheel and sdist
        run: |
          pip install build==1.5.0
          python -m build

  security-scan:
    name: Security audit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Install package
        run: pip install -e .
      - name: pip-audit
        run: |
          pip install pip-audit==2.10.1
          pip-audit --skip-editable

  sbom:
    name: Generate SBOM
    needs: [lint-and-test, security-scan]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Install package
        run: pip install -e .
      - name: Generate SBOM
        run: |
          pip install cyclonedx-bom==7.3.0
          cyclonedx-py environment -o bom.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: bom.json
          retention-days: 90

  release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint-and-test, security-scan, sbom]
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: bom.json
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          body_path: CHANGELOG.md
          files: bom.json
